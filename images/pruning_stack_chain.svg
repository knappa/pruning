  <!-- CELLPHY -->
  <rect x="268" y="116" width="82" height="28" rx="4" fill="#e8f0fe" stroke="#666" stroke-width="1.5"/>
  <text x="309" y="130" font-family="monospace" font-size="13" text-anchor="middle" dy="0.35em" fill="#222">CELLPHY</text>

  <!-- PHASED_DNA16 -->
