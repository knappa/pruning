<svg xmlns="http://www.w3.org/2000/svg" width="630" height="240" viewBox="0 0 630 240">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <!-- F81 init -> GTR4 -->
  <line x1="90" y1="130" x2="118" y2="130" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- GTR4 -> UNPHASED_DNA (elbow up) -->
  <path d="M 200,124 L 224,124 L 224,60 L 248,60" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- GTR4 -> CELLPHY (horizontal) -->
  <line x1="200" y1="130" x2="266" y2="130" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- GTR4 -> PHASED_DNA16 (elbow down) -->
  <path d="M 200,136 L 224,136 L 224,200 L 253,200" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <!-- UNPHASED_DNA -> GTR10Z -->
  <line x1="370" y1="60" x2="418" y2="60" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- GTR10Z -> GTR10 -->
  <line x1="497" y1="60" x2="545" y2="60" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- PHASED_DNA16 -> PHASED_DNA16_MP -->
  <line x1="365" y1="200" x2="416" y2="200" stroke="#666" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- F81 init -->
  <rect x="10" y="116" width="80" height="28" rx="4" fill="#e8f0fe" stroke="#666" stroke-width="1.5"/>
