  <text x="160" y="130" font-family="monospace" font-size="13" text-anchor="middle" dy="0.35em" fill="#222">GTR4</text>

  <!-- UNPHASED_DNA -->
  <rect x="248" y="46" width="122" height="28" rx="4" fill="#e8f0fe" stroke="#666" stroke-width="1.5"/>
  <text x="309" y="60" font-family="monospace" font-size="13" text-anchor="middle" dy="0.35em" fill="#222">UNPHASED_DNA</text>

  <!-- GTR10Z -->
